    <section class="acompanhamentos-section">
        <div class="container">
            <h2 class="section-title">Nossos Acompanhamentos</h2>

            <div class="acompanhamentos-grid">

                <!-- Card 1 -->
                <div class="acompanhamento-card">
                    <div class="card-image-container">
                        <img src="img/batata_pequena.png" alt="Batata Pequena" class="card-image">
                    </div>
                    <h3 class="card-title">Batata<br>Pequena</h3>
                    <div class="card-footer">
                        <button class="card-btn">Adicionar</button>
                    </div>
                </div>
                <!-- Card 2 -->
                <div class="acompanhamento-card">
                    <div class="card-image-container">
                        <img src="img/batata_media.png" alt="Batata Média" class="card-image">
                    </div>
                    <h3 class="card-title">Batata<br>Média</h3>
                    <div class="card-footer">
                        <button class="card-btn">Adicionar</button>
                    </div>
                </div>
                <!-- Card 3 -->
                <div class="acompanhamento-card">
                    <div class="card-image-container">

                    </div>
                    <h3 class="card-title">Batata<br>Grande</h3>
                    <div class="card-footer">
                        <button class="card-btn">Adicionar</button>
                    </div>
                </div>
                <!-- Card 4 -->
                <div class="acompanhamento-card">

                <!-- Card 5 -->

                    </div>
                    <h3 class="card-title">Nuggets<br><br></h3>
                    <div class="card-footer">
                        <button class="card-btn">Adicionar</button>
                    </div>
                </div>
                <!-- Card 6 -->
                <div class="acompanhamento-card">
                    <div class="card-image-container">

                    </div>
                    <h3 class="card-title">Batata Cheddar e Bacon</h3>

                        <button class="card-btn">Adicionar</button>
                    </div>
