<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

        <nav class="navbar navbar-expand-lg" style="background-color:#3B2A1A;">
            <div class="container">

                <!-- Logo / Nome -->
                <a class="navbar-brand d-flex align-items-center gap-2" href="/main.html">
                    <img src="img/logo.png" alt="Logo" width="100">
                    <span class="fw-bold" style="color:#D4A017;">
                        Burguer Kinze
                    </span>
                </a>

                <!-- Botão mobile -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Menu -->
                <div class="collapse navbar-collapse" id="menuNavbar">
                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-3">
                        <li class="nav-item">
                            <a class="nav-link text-light fw-semibold" href="#">Combos</a>

                        <li class="nav-item">

                            <a class="nav-link text-light fw-semibold" href="#">Acompanhamentos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-light fw-semibold" href="#">Bebidas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-light fw-semibold" href="#">Sobremesas</a>
                        </li>
                    </ul>

                    <!-- Busca -->
                    <form class="d-flex search-form">
                        <input class="form-control search-input" type="search" placeholder="Buscar produtos...">
                        <button class="btn search-btn" type="button">
                            🔍
                        </button>
                    </form>
                </div>
            </div>
        </nav>
    </header>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
